apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: server-release
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[refs/tags/v*]"
    pipelinesascode.tekton.dev/max-keep-runs: "2"
    pipelinesascode.tekton.dev/task: "[https://git.holdenitdown.net/rfhold/homelab/raw/branch/main/src/components/tekton-tasks/git-clone.yaml, https://git.holdenitdown.net/rfhold/homelab/raw/branch/main/src/components/tekton-tasks/buildkit-build.yaml, https://git.holdenitdown.net/rfhold/homelab/raw/branch/main/src/components/tekton-tasks/manifest-create.yaml, https://git.holdenitdown.net/rfhold/homelab/raw/branch/main/src/components/tekton-tasks/image-exists.yaml, https://git.holdenitdown.net/rfhold/homelab/raw/branch/main/src/components/tekton-tasks/kustomize-deploy.yaml, https://git.holdenitdown.net/rfhold/homelab/raw/branch/main/src/components/tekton-tasks/forgejo-release.yaml]"
spec:
  params:
    - name: repo-url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: repo-url
        type: string
      - name: revision
        type: string
    workspaces:
      - name: source
    tasks:
      - name: fetch-repository
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Task
          name: git-clone
        params:
          - name: repo-url
            value: $(params.repo-url)
          - name: revision
            value: $(params.revision)
        workspaces:
          - name: output
            workspace: source

      - name: resolve-version
        runAfter: [fetch-repository]
        taskSpec:
          params:
            - name: revision
              type: string
          results:
            - name: tag
          workspaces:
            - name: source
          steps:
            - name: resolve
              image: alpine/git:latest
              workingDir: $(workspaces.source.path)
              script: |
                #!/bin/sh
                set -e
                TAG=$(git describe --tags --exact-match $(params.revision) 2>/dev/null || echo "")
                if [ -z "$TAG" ]; then
                  echo "No tag found at revision $(params.revision)"
                  exit 1
                fi
                echo -n "$TAG" > $(results.tag.path)
        params:
          - name: revision
            value: $(params.revision)
        workspaces:
          - name: source
            workspace: source

      - name: build-amd64
        runAfter: [resolve-version]
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Task
          name: buildkit-build
        params:
          - name: image
            value: "{{ CONTAINER_REGISTRY }}/{{ repo_owner }}/tmux-server:$(tasks.resolve-version.results.tag)-amd64"
          - name: buildkit-addr
            value: "{{ BUILDKIT_AMD64_ADDR }}"
          - name: dockerfile
            value: Dockerfile.tmux-server
        workspaces:
          - name: source
            workspace: source

      - name: build-arm64
        runAfter: [resolve-version]
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Task
          name: buildkit-build
        params:
          - name: image
            value: "{{ CONTAINER_REGISTRY }}/{{ repo_owner }}/tmux-server:$(tasks.resolve-version.results.tag)-arm64"
          - name: buildkit-addr
            value: "{{ BUILDKIT_ARM64_ADDR }}"
          - name: dockerfile
            value: Dockerfile.tmux-server
        workspaces:
          - name: source
            workspace: source

      - name: create-manifest
        runAfter: [build-amd64, build-arm64]
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Task
          name: manifest-create
        params:
          - name: base-image
            value: "{{ CONTAINER_REGISTRY }}/{{ repo_owner }}/tmux-server"
          - name: tag
            value: $(tasks.resolve-version.results.tag)

    finally:
      - name: notify-failure
        when:
          - input: $(tasks.status)
            operator: in
            values: ["Failed"]
        taskSpec:
          volumes:
            - name: git-auth
              secret:
                secretName: "{{ git_auth_secret }}"
          steps:
            - name: create-issue
              image: curlimages/curl:latest
              volumeMounts:
                - name: git-auth
                  mountPath: /etc/git-auth
              script: |
                #!/bin/sh
                set -e
                TOKEN=$(cat /etc/git-auth/git-provider-token)
                curl -fsS -X POST \
                  "{{ GIT_URL }}/api/v1/repos/{{ repo_owner }}/{{ repo_name }}/issues" \
                  -H "Authorization: token $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"title\":\"Server image build failed for {{ revision }}\",\"body\":\"Check the [Tekton dashboard](https://tekton.holdenitdown.net) for details.\"}"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi
