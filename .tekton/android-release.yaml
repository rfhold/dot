apiVersion: tekton.dev/v1
kind: PipelineRun
metadata:
  name: android-release
  annotations:
    pipelinesascode.tekton.dev/on-event: "[push]"
    pipelinesascode.tekton.dev/on-target-branch: "[refs/tags/v*]"
    pipelinesascode.tekton.dev/max-keep-runs: "2"
spec:
  params:
    - name: repo-url
      value: "{{ repo_url }}"
    - name: revision
      value: "{{ revision }}"
  pipelineSpec:
    params:
      - name: repo-url
        type: string
      - name: revision
        type: string
    workspaces:
      - name: source
    tasks:
      - name: fetch-repository
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Task
          name: git-clone
        params:
          - name: repo-url
            value: $(params.repo-url)
          - name: revision
            value: $(params.revision)
        workspaces:
          - name: output
            workspace: source

      - name: resolve-version
        runAfter: [fetch-repository]
        taskSpec:
          params:
            - name: revision
              type: string
          results:
            - name: version
            - name: version-name
            - name: version-code
          workspaces:
            - name: source
          steps:
            - name: resolve
              image: alpine/git:latest
              workingDir: $(workspaces.source.path)
              script: |
                #!/bin/sh
                set -e
                TAG=$(git describe --tags --exact-match $(params.revision) 2>/dev/null || echo "")
                if [ -z "$TAG" ]; then
                  echo "No tag found at revision $(params.revision)"
                  exit 1
                fi
                echo -n "$TAG" > $(results.version.path)
                VERSION_NAME=$(echo "$TAG" | sed 's/^v//')
                echo -n "$VERSION_NAME" > $(results.version-name.path)
                MAJOR=$(echo "$VERSION_NAME" | cut -d. -f1)
                MINOR=$(echo "$VERSION_NAME" | cut -d. -f2)
                PATCH=$(echo "$VERSION_NAME" | cut -d. -f3)
                VERSION_CODE=$(( ${MAJOR:-0} * 10000 + ${MINOR:-0} * 100 + ${PATCH:-0} ))
                echo -n "$VERSION_CODE" > $(results.version-code.path)
        params:
          - name: revision
            value: $(params.revision)
        workspaces:
          - name: source
            workspace: source

      - name: build-signed-apk
        runAfter: [resolve-version]
        taskSpec:
          params:
            - name: version-name
              type: string
            - name: version-code
              type: string
          workspaces:
            - name: source
          volumes:
            - name: keystore
              secret:
                secretName: android-keystore
          steps:
            - name: fix-permissions
              image: alpine:latest
              workingDir: $(workspaces.source.path)
              script: |
                #!/bin/sh
                chmod -R 777 .
            - name: build
              image: cr.holdenitdown.net/rfhold/android-ci:latest
              workingDir: $(workspaces.source.path)/android
              volumeMounts:
                - name: keystore
                  mountPath: /etc/android-keystore
              script: |
                #!/bin/sh
                set -e
                STORE_PASSWORD=$(cat /etc/android-keystore/keystore-password)
                KEY_ALIAS=$(cat /etc/android-keystore/key-alias)
                KEY_PASSWORD=$(cat /etc/android-keystore/key-password)
                sh ./gradlew assembleRelease --no-daemon --stacktrace \
                  -Prelease.keystorePath=/etc/android-keystore/keystore.jks \
                  -Prelease.storePassword="$STORE_PASSWORD" \
                  -Prelease.keyAlias="$KEY_ALIAS" \
                  -Prelease.keyPassword="$KEY_PASSWORD" \
                  -Papp.versionName="$(params.version-name)" \
                  -Papp.versionCode="$(params.version-code)"
                cp app/build/outputs/apk/release/app-release.apk \
                  $(workspaces.source.path)/tmux-viewer-$(params.version-name).apk
        params:
          - name: version-name
            value: $(tasks.resolve-version.results.version-name)
          - name: version-code
            value: $(tasks.resolve-version.results.version-code)
        workspaces:
          - name: source
            workspace: source

      - name: create-release
        runAfter: [build-signed-apk]
        taskRef:
          apiVersion: tekton.dev/v1
          kind: Task
          name: forgejo-release
        params:
          - name: git-url
            value: "{{ GIT_URL }}"
          - name: repo-owner
            value: "{{ repo_owner }}"
          - name: repo-name
            value: "{{ repo_name }}"
          - name: tag
            value: $(tasks.resolve-version.results.version)
          - name: title
            value: "tmux-viewer $(tasks.resolve-version.results.version)"
          - name: body
            value: "Android release $(tasks.resolve-version.results.version)"
          - name: git-auth-secret
            value: "{{ git_auth_secret }}"

      - name: attach-apk
        runAfter: [create-release]
        taskSpec:
          params:
            - name: release-id
              type: string
            - name: version-name
              type: string
          workspaces:
            - name: source
          volumes:
            - name: git-auth
              secret:
                secretName: "{{ git_auth_secret }}"
          steps:
            - name: upload
              image: curlimages/curl:latest
              workingDir: $(workspaces.source.path)
              volumeMounts:
                - name: git-auth
                  mountPath: /etc/git-auth
              script: |
                #!/bin/sh
                set -e
                TOKEN=$(cat /etc/git-auth/git-provider-token)
                APK_FILE="tmux-viewer-$(params.version-name).apk"
                if [ ! -f "$APK_FILE" ]; then
                  echo "APK not found: $APK_FILE"
                  exit 1
                fi
                HTTP_CODE=$(curl -w "%{http_code}" -sS -o /tmp/upload-response.json \
                  -H "Authorization: token $TOKEN" \
                  -H "Content-Type: multipart/form-data" \
                  -F "attachment=@$APK_FILE" \
                  "{{ GIT_URL }}/api/v1/repos/{{ repo_owner }}/{{ repo_name }}/releases/$(params.release-id)/assets?name=$APK_FILE")
                if [ "$HTTP_CODE" -lt 200 ] || [ "$HTTP_CODE" -ge 300 ]; then
                  echo "Upload failed (HTTP $HTTP_CODE)"
                  cat /tmp/upload-response.json
                  exit 1
                fi
                echo "APK uploaded (HTTP $HTTP_CODE)"
        params:
          - name: release-id
            value: $(tasks.create-release.results.release-id)
          - name: version-name
            value: $(tasks.resolve-version.results.version-name)
        workspaces:
          - name: source
            workspace: source

    finally:
      - name: notify-failure
        when:
          - input: $(tasks.status)
            operator: in
            values: ["Failed"]
        taskSpec:
          volumes:
            - name: git-auth
              secret:
                secretName: "{{ git_auth_secret }}"
          steps:
            - name: create-issue
              image: curlimages/curl:latest
              volumeMounts:
                - name: git-auth
                  mountPath: /etc/git-auth
              script: |
                #!/bin/sh
                set -e
                TOKEN=$(cat /etc/git-auth/git-provider-token)
                curl -fsS -X POST \
                  "{{ GIT_URL }}/api/v1/repos/{{ repo_owner }}/{{ repo_name }}/issues" \
                  -H "Authorization: token $TOKEN" \
                  -H "Content-Type: application/json" \
                  -d "{\"title\":\"Android release build failed\",\"body\":\"Check the [Tekton dashboard](https://tekton.holdenitdown.net) for details.\"}"
  workspaces:
    - name: source
      volumeClaimTemplate:
        spec:
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 4Gi
